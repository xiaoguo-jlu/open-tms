<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open-TMS - 国家/地区管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { DEFAULT: '#1E40AF', hover: '#1E3A8A', 50: '#EFF6FF', 100: '#DBEAFE' },
                        secondary: '#6366F1',
                        success: '#10B981',
                        error: '#EF4444',
                        slate: { 50: '#F8FAFC', 100: '#F1F5F9', 200: '#E2E8F0', 300: '#CBD5E1', 400: '#94A3B8', 500: '#64748B', 600: '#475569', 700: '#334155', 800: '#1E293B', 900: '#0F172A' }
                    }
                }
            }
        }
    </script>
    <style>body { font-family: 'Inter', -apple-system, system-ui, sans-serif; }</style>
</head>
<body class="bg-slate-50 min-h-screen">
    <header class="fixed top-0 left-0 right-0 h-16 bg-white border-b border-slate-200 z-50">
        <div class="flex items-center justify-between h-full px-6">
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center"><span class="text-white font-bold text-sm">TMS</span></div>
                    <span class="font-semibold text-slate-800">Open-TMS</span>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <div class="relative">
                    <input type="text" placeholder="搜索菜单... (Ctrl+K)" class="w-64 h-9 pl-9 pr-4 bg-slate-100 border-0 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary/20">
                    <svg class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                </div>
                <button class="w-9 h-9 flex items-center justify-center rounded-lg hover:bg-slate-100 text-slate-500"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg></button>
                <div class="flex items-center gap-2 pl-3 border-l border-slate-200">
                    <div class="w-8 h-8 bg-secondary rounded-full flex items-center justify-center"><span class="text-white text-sm font-medium">U</span></div>
                </div>
            </div>
        </div>
    </header>

    <aside class="fixed left-0 top-16 bottom-0 w-16 bg-slate-900 flex flex-col items-center py-4 z-40">
        <button class="w-11 h-11 rounded-lg flex items-center justify-center text-slate-400 hover:bg-slate-800 hover:text-white transition-colors group relative">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
    </aside>

    <div id="menuPanel" class="fixed left-16 top-16 bottom-0 w-[560px] bg-slate-800 z-30 transform -translate-x-full transition-transform duration-200">
        <div class="p-4 border-b border-slate-700 flex items-center justify-between">
            <h2 class="text-white font-semibold">基础数据</h2>
            <input type="text" placeholder="搜索子菜单..." class="w-48 h-8 px-3 bg-slate-700 border-0 rounded text-sm text-white placeholder-slate-400">
        </div>
        <div class="p-4 overflow-y-auto" style="max-height: calc(100vh - 64px);">
            <div class="grid grid-cols-3 gap-3">
                <a href="business-unit.html" class="block p-3 bg-slate-700/50 rounded-lg hover:bg-slate-700">
                    <div class="flex items-center gap-2 mb-1"><svg class="w-4 h-4 text-primary-100" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg><span class="text-white font-medium text-sm">业务单元</span></div><span class="text-slate-400 text-xs">管理</span>
                </a>
                <a href="trader.html" class="block p-3 bg-slate-700/50 rounded-lg hover:bg-slate-700">
                    <div class="flex items-center gap-2 mb-1"><svg class="w-4 h-4 text-primary-100" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg><span class="text-white font-medium text-sm">交易员</span></div><span class="text-slate-400 text-xs">管理</span>
                </a>
                <a href="currency.html" class="block p-3 bg-slate-700/50 rounded-lg hover:bg-slate-700">
                    <div class="flex items-center gap-2 mb-1"><svg class="w-4 h-4 text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1"/></svg><span class="text-white font-medium text-sm">币种</span></div><span class="text-slate-400 text-xs">管理</span>
                </a>
                <a href="#" class="block p-3 bg-slate-700/50 rounded-lg hover:bg-slate-700">
                    <div class="flex items-center gap-2 mb-1"><svg class="w-4 h-4 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064"/></svg><span class="text-white font-medium text-sm">国家/地区</span></div><span class="text-slate-400 text-xs">管理</span>
                </a>
                <a href="#" class="block p-3 bg-slate-700/50 rounded-lg hover:bg-slate-700">
                    <div class="flex items-center gap-2 mb-1"><svg class="w-4 h-4 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg><span class="text-white font-medium text-sm">节假日</span></div><span class="text-slate-400 text-xs">管理</span>
                </a>
                <a href="#" class="block p-3 bg-slate-700/50 rounded-lg hover:bg-slate-700">
                    <div class="flex items-center gap-2 mb-1"><svg class="w-4 h-4 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16"/></svg><span class="text-white font-medium text-sm">银行</span></div><span class="text-slate-400 text-xs">信息管理</span>
                </a>
                <a href="#" class="block p-3 bg-slate-700/50 rounded-lg hover:bg-slate-700">
                    <div class="flex items-center gap-2 mb-1"><svg class="w-4 h-4 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857"/></svg><span class="text-white font-medium text-sm">交易对手</span></div><span class="text-slate-400 text-xs">管理</span>
                </a>
                <a href="#" class="block p-3 bg-slate-700/50 rounded-lg hover:bg-slate-700">
                    <div class="flex items-center gap-2 mb-1"><svg class="w-4 h-4 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/></svg><span class="text-white font-medium text-sm">对手方账户</span></div><span class="text-slate-400 text-xs">管理</span>
                </a>
            </div>
        </div>
    </div>

    <main class="ml-16 mt-16 p-6">
        <div class="flex items-center gap-2 text-sm text-slate-500 mb-4">
            <a href="#" class="hover:text-slate-700">基础数据</a>
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
            <span class="text-slate-700 font-medium">国家/地区管理</span>
        </div>

        <div class="flex items-center justify-between mb-6">
            <h1 class="text-2xl font-semibold text-slate-800">国家/地区管理</h1>
            <button onclick="openDrawer('add')" class="flex items-center gap-2 px-4 h-10 bg-primary text-white rounded-lg hover:bg-primary-hover">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                <span class="text-sm font-medium">新增</span>
            </button>
        </div>

        <div class="bg-white rounded-xl border border-slate-200 p-4 mb-4">
            <div class="flex items-center gap-4">
                <div class="flex-1"><div class="relative"><input type="text" placeholder="搜索代码/名称..." class="w-full h-10 pl-10 pr-4 border border-slate-200 rounded-lg text-sm"><svg class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg></div></div>
                <select class="h-10 px-4 border border-slate-200 rounded-lg text-sm"><option value="">全部状态</option><option value="1">启用</option><option value="0">停用</option></select>
                <button class="h-10 px-4 bg-primary text-white rounded-lg text-sm font-medium">查询</button>
                <button class="h-10 px-4 border border-slate-300 text-slate-600 rounded-lg text-sm font-medium">重置</button>
            </div>
        </div>

        <div class="bg-white rounded-xl border border-slate-200 overflow-hidden">
            <table class="w-full">
                <thead class="bg-slate-50 border-b border-slate-200">
                    <tr>
                        <th class="w-10 px-4 py-3 text-left"><input type="checkbox" class="w-4 h-4 rounded"></th>
                        <th class="px-4 py-3 text-left text-xs font-semibold text-slate-500">操作</th>
                        <th class="px-4 py-3 text-left text-xs font-semibold text-slate-500">国家代码</th>
                        <th class="px-4 py-3 text-left text-xs font-semibold text-slate-500">国家名称</th>
                        <th class="px-4 py-3 text-left text-xs font-semibold text-slate-500">英文名称</th>
                        <th class="px-4 py-3 text-left text-xs font-semibold text-slate-500">时区</th>
                        <th class="px-4 py-3 text-left text-xs font-semibold text-slate-500">区号</th>
                        <th class="px-4 py-3 text-left text-xs font-semibold text-slate-500">状态</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-100">
                    <tr class="hover:bg-slate-50">
                        <td class="px-4 py-3"><input type="checkbox" class="w-4 h-4 rounded"></td>
                        <td class="px-4 py-3"><div class="flex items-center gap-1"><button onclick="openDrawer('edit')" class="p-1.5 text-slate-400 hover:text-primary rounded"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg></button><button onclick="confirmDelete()" class="p-1.5 text-slate-400 hover:text-error rounded"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3"/></svg></button></div></td>
                        <td class="px-4 py-3 text-sm text-slate-700 font-mono font-semibold">CN</td>
                        <td class="px-4 py-3 text-sm text-slate-700">中国</td>
                        <td class="px-4 py-3 text-sm text-slate-500">China</td>
                        <td class="px-4 py-3 text-sm text-slate-500">Asia/Shanghai</td>
                        <td class="px-4 py-3 text-sm text-slate-500">+86</td>
                        <td class="px-4 py-3"><span class="px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-700">启用</span></td>
                    </tr>
                    <tr class="hover:bg-slate-50">
                        <td class="px-4 py-3"><input type="checkbox" class="w-4 h-4 rounded"></td>
                        <td class="px-4 py-3"><div class="flex items-center gap-1"><button onclick="openDrawer('edit')" class="p-1.5 text-slate-400 hover:text-primary rounded"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg></button><button onclick="confirmDelete()" class="p-1.5 text-slate-400 hover:text-error rounded"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3"/></svg></button></div></td>
                        <td class="px-4 py-3 text-sm text-slate-700 font-mono font-semibold">US</td>
                        <td class="px-4 py-3 text-sm text-slate-700">美国</td>
                        <td class="px-4 py-3 text-sm text-slate-500">United States</td>
                        <td class="px-4 py-3 text-sm text-slate-500">America/New_York</td>
                        <td class="px-4 py-3 text-sm text-slate-500">+1</td>
                        <td class="px-4 py-3"><span class="px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-700">启用</span></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="flex items-center justify-between mt-4">
            <span class="text-sm text-slate-500">显示 1-10 条，共 248 条</span>
            <div class="flex items-center gap-2">
                <button class="w-8 h-8 flex items-center justify-center rounded border border-slate-200 text-slate-500 disabled:opacity-50" disabled><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg></button>
                <button class="w-8 h-8 flex items-center justify-center rounded bg-primary text-white text-sm">1</button>
                <button class="w-8 h-8 flex items-center justify-center rounded border border-slate-200 text-slate-600 text-sm">2</button>
                <button class="w-8 h-8 flex items-center justify-center rounded border border-slate-200 text-slate-500"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg></button>
            </div>
        </div>
    </main>

    <div id="drawer" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-black/50" onclick="closeDrawer()"></div>
        <div id="drawerContent" class="absolute right-0 top-0 bottom-0 w-[480px] bg-white shadow-xl transform translate-x-full transition-transform duration-200">
            <div class="flex flex-col h-full">
                <div class="flex items-center justify-between px-6 py-4 border-b border-slate-200">
                    <h2 id="drawerTitle" class="text-lg font-semibold text-slate-800">新增国家</h2>
                    <button onclick="closeDrawer()" class="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-slate-100 text-slate-400"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
                </div>
                <div class="flex-1 overflow-y-auto p-6">
                    <form class="space-y-4">
                        <div><label class="block text-sm font-medium text-slate-700 mb-1">国家代码 <span class="text-error">*</span></label><input type="text" placeholder="如 CN、US" class="w-full h-10 px-3 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary/20"></div>
                        <div><label class="block text-sm font-medium text-slate-700 mb-1">国家名称 <span class="text-error">*</span></label><input type="text" placeholder="如 中国" class="w-full h-10 px-3 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary/20"></div>
                        <div><label class="block text-sm font-medium text-slate-700 mb-1">英文名称</label><input type="text" placeholder="如 China" class="w-full h-10 px-3 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary/20"></div>
                        <div><label class="block text-sm font-medium text-slate-700 mb-1">时区</label><input type="text" placeholder="如 Asia/Shanghai" class="w-full h-10 px-3 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary/20"></div>
                        <div><label class="block text-sm font-medium text-slate-700 mb-1">区号</label><input type="text" placeholder="如 +86" class="w-full h-10 px-3 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary/20"></div>
                        <div><label class="block text-sm font-medium text-slate-700 mb-2">状态</label><div class="flex items-center gap-6"><label class="flex items-center gap-2"><input type="radio" name="status" value="1" checked class="w-4 h-4 text-primary"><span class="text-sm text-slate-700">启用</span></label><label class="flex items-center gap-2"><input type="radio" name="status" value="0" class="w-4 h-4 text-primary"><span class="text-sm text-slate-700">停用</span></label></div></div>
                    </form>
                </div>
                <div class="flex items-center justify-end gap-3 px-6 py-4 border-t border-slate-200 bg-slate-50">
                    <button onclick="closeDrawer()" class="h-10 px-4 border border-slate-300 text-slate-700 rounded-lg text-sm font-medium">取消</button>
                    <button onclick="closeDrawer()" class="h-10 px-6 bg-primary text-white rounded-lg text-sm font-medium">保存</button>
                </div>
            </div>
        </div>
    </div>

    <div id="deleteModal" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-black/50" onclick="closeDeleteModal()"></div>
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[400px] bg-white rounded-xl shadow-xl">
            <div class="p-6">
                <div class="flex items-center gap-3 mb-4"><div class="w-10 h-10 rounded-full bg-red-100 flex items-center justify-center"><svg class="w-5 h-5 text-error" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg></div><div><h3 class="text-lg font-semibold text-slate-800">确认删除</h3><p class="text-sm text-slate-500">此操作不可撤销</p></div></div>
                <p class="text-sm text-slate-600 mb-6">确定要删除该国家/地区吗？</p>
                <div class="flex justify-end gap-3"><button onclick="closeDeleteModal()" class="h-10 px-4 border border-slate-300 text-slate-700 rounded-lg text-sm font-medium">取消</button><button onclick="closeDeleteModal()" class="h-10 px-4 bg-error text-white rounded-lg text-sm font-medium">确定删除</button></div>
            </div>
        </div>
    </div>

    <script>
        const menuPanel = document.getElementById('menuPanel');
        let menuTimeout;
        document.querySelectorAll('aside button').forEach(btn => { btn.addEventListener('mouseenter', () => { clearTimeout(menuTimeout); menuPanel.classList.remove('-translate-x-full'); }); });
        menuPanel.addEventListener('mouseleave', () => { menuTimeout = setTimeout(() => { menuPanel.classList.add('-translate-x-full'); }, 200); });
        function openDrawer(mode) { document.getElementById('drawerTitle').textContent = mode === 'add' ? '新增国家' : '编辑国家'; document.getElementById('drawer').classList.remove('hidden'); setTimeout(() => document.getElementById('drawerContent').classList.remove('translate-x-full'), 10); }
        function closeDrawer() { document.getElementById('drawerContent').classList.add('translate-x-full'); setTimeout(() => document.getElementById('drawer').classList.add('hidden'), 200); }
        function confirmDelete() { document.getElementById('deleteModal').classList.remove('hidden'); }
        function closeDeleteModal() { document.getElementById('deleteModal').classList.add('hidden'); }
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') { closeDrawer(); closeDeleteModal(); } });
    </script>
</body>
</html>
